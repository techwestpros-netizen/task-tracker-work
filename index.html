<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    video {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
      border-radius: 12px;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #7c3aed;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Barcode Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>
<button onclick="startCamera()">Open Camera</button>

<div id="result">Waiting...</div>

<script>
let stream;

async function startCamera() {
  const video = document.getElementById("video");

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    document.getElementById("result").innerText = 
      "Camera working — now we add scanning next";

  } catch (err) {
    alert("Camera failed: " + err);
  }
}
</script>

</body>
</html>
